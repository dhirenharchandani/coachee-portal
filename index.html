<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* =====================================================================
   CONFIG — Supabase
   ===================================================================== */
const SUPABASE_URL = "https://diiazuiyxxcecjnjmirt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_xEPPs63vVVCELKyb0WrDtQ_qAAnvErH";
const USE_REAL_AUTH = !!(SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase);
const sb = USE_REAL_AUTH ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// Localhost-only mock mode — load data/_preview/<folder>.json without auth.
// Only active on localhost; production ignores the ?mock query param.
const IS_LOCALHOST = typeof location !== 'undefined' && (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
const MOCK_FOLDER = IS_LOCALHOST ? new URLSearchParams(location.search).get('mock') : null;

/* =====================================================================
   DATA LOAD — Supabase or fallback to embedded JSON
   ===================================================================== */
function useCoacheeData(authedEmail) {
  const [rows, setRows] = useState(null);
  const [error, setError] = useState(null);
  const [activeFolder, setActiveFolderState] = useState(() => localStorage.getItem('ig-active-folder'));

  useEffect(() => {
    if (!authedEmail) return;
    if (MOCK_FOLDER) {
      // Localhost preview — load from disk, skip Supabase
      fetch(`data/_preview/${MOCK_FOLDER}.json`)
        .then(r => { if (!r.ok) throw new Error(`No mock data for "${MOCK_FOLDER}"`); return r.json(); })
        .then(d => setRows([{ email: `mock-${MOCK_FOLDER}`, folder: MOCK_FOLDER, data: d }]))
        .catch(e => setError(e.message));
      return;
    }
    if (sb) {
      // RLS returns every row this user can access (own row + any aliased rows for coach mode)
      sb.from('coachees').select('email, folder, data').order('folder')
        .then(({ data: result, error: err }) => {
          if (err) { setError(err.message); return; }
          if (!result || result.length === 0) { setError('NO_DASHBOARD'); return; }
          setRows(result);
        });
    } else {
      fetch('data/anshuman.json')
        .then(r => { if (!r.ok) throw new Error('Failed to load coachee data'); return r.json(); })
        .then(d => setRows([{ email: 'local', folder: 'local', data: d }]))
        .catch(e => setError(e.message));
    }
  }, [authedEmail]);

  // Pick the active row: last-selected if available, else first
  const activeRow = useMemo(() => {
    if (!rows) return null;
    return rows.find(r => r.folder === activeFolder) || rows[0];
  }, [rows, activeFolder]);

  const data = activeRow?.data || null;
  const rowEmail = activeRow?.email || null;

  const setActiveFolder = (folder) => {
    if (rows?.find(r => r.folder === folder)) {
      setActiveFolderState(folder);
      localStorage.setItem('ig-active-folder', folder);
    }
  };

  // Generic data updater — local state + RLS-gated UPDATE to the row
  const updateData = async (newData) => {
    if (!data || !rowEmail || !sb) return;
    setRows(prev => prev.map(r => r.folder === activeRow.folder ? { ...r, data: newData } : r));
    const { error: err } = await sb.from('coachees').update({ data: newData }).eq('email', rowEmail);
    if (err) console.error('Update failed:', err);
  };

  // Patch a profile field locally + persist
  const updateProfileField = async (key, value) => {
    if (!data) return;
    await updateData({ ...data, profile: { ...data.profile, [key]: value } });
  };

  // Compact list for switcher dropdown
  const coachees = rows?.map(r => ({
    folder: r.folder,
    name: r.data?.profile?.name,
    preferredName: r.data?.profile?.preferredName,
  })) || [];

  return { data, error, updateProfileField, updateData, coachees, activeFolder: activeRow?.folder, setActiveFolder };
}

/* =====================================================================
   THEME + ACTION ITEM STATE (localStorage)
   ===================================================================== */
function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem('ig-theme') || 'dark');
  useEffect(() => {
    document.body.dataset.theme = theme;
    localStorage.setItem('ig-theme', theme);
  }, [theme]);
  return [theme, () => setTheme(theme === 'dark' ? 'light' : 'dark')];
}

function useViewedSessions(coacheeId, allSessionIds) {
  const key = `ig-viewed-sessions-${coacheeId}`;
  const initKey = `ig-viewed-init-${coacheeId}`;
  const [viewed, setViewed] = useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem(key) || '[]');
      // First-load grace: mark all existing sessions as viewed so no false badges
      if (!localStorage.getItem(initKey)) {
        localStorage.setItem(key, JSON.stringify(allSessionIds));
        localStorage.setItem(initKey, '1');
        return new Set(allSessionIds);
      }
      return new Set(stored);
    } catch { return new Set(allSessionIds); }
  });
  const markViewed = useCallback((sessionId) => {
    setViewed(prev => {
      if (prev.has(sessionId)) return prev;
      const next = new Set(prev); next.add(sessionId);
      localStorage.setItem(key, JSON.stringify([...next]));
      return next;
    });
  }, [key]);
  const unviewedIds = useMemo(() => allSessionIds.filter(id => !viewed.has(id)), [allSessionIds, viewed]);
  return { viewed, markViewed, unviewedCount: unviewedIds.length, unviewedIds };
}

// Normalize any non-standard status value (e.g. legacy "open") to "pending"
const normalizeStatus = (s) => (s === 'pending' || s === 'ongoing' || s === 'done') ? s : 'pending';

function useActionStatus(data, updateData) {
  const items = useMemo(
    () => (data?.actionItems || []).map(it => ({ ...it, status: normalizeStatus(it.status) })),
    [data?.actionItems]
  );
  const cycleStatus = (id) => {
    if (!data) return;
    const newActions = (data.actionItems || []).map(it => {
      if (it.id !== id) return it;
      const cur = normalizeStatus(it.status);
      const next = cur === 'pending' ? 'ongoing' : cur === 'ongoing' ? 'done' : 'pending';
      return { ...it, status: next };
    });
    updateData({ ...data, actionItems: newActions });
  };
  return [items, cycleStatus];
}

function usePriorityStatus(data, updateData) {
  const items = useMemo(
    () => (data?.nextQuarter || []).map(p => ({
      ...p,
      id: p.id || `p-${p.number}`,
      status: normalizeStatus(p.status),
    })),
    [data?.nextQuarter]
  );
  const cyclePriority = (id) => {
    if (!data) return;
    const newPriorities = (data.nextQuarter || []).map(p => {
      const pid = p.id || `p-${p.number}`;
      if (pid !== id) return p;
      const cur = normalizeStatus(p.status);
      const next = cur === 'pending' ? 'ongoing' : cur === 'ongoing' ? 'done' : 'pending';
      return { ...p, id: pid, status: next };
    });
    updateData({ ...data, nextQuarter: newPriorities });
  };
  return [items, cyclePriority];
}

/* =====================================================================
   ROUTING (hash-based)
   ===================================================================== */
function useHashRoute() {
  const [route, setRoute] = useState(() => window.location.hash.slice(1) || '/overview');
  useEffect(() => {
    const onHash = () => setRoute(window.location.hash.slice(1) || '/overview');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const go = (path) => { window.location.hash = path; };
  return [route, go];
}

/* =====================================================================
   AUTH
   ===================================================================== */
function useAuth() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (MOCK_FOLDER) {
      // Localhost preview — fake an authed user, bypass Supabase auth
      setSession({ user: { email: `preview-${MOCK_FOLDER}@local` } });
      setLoading(false);
      return;
    }
    if (!sb) {
      // Fallback soft auth for preview-without-keys
      const fake = sessionStorage.getItem('ig-authed-email');
      if (fake) setSession({ user: { email: fake } });
      setLoading(false);
      return;
    }
    sb.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => setSession(session));
    return () => subscription.unsubscribe();
  }, []);

  const sendMagicLink = async (email) => {
    if (!sb) {
      // Fallback for preview-mode
      sessionStorage.setItem('ig-authed-email', email);
      setSession({ user: { email } });
      return { ok: true, devNote: 'Setup mode — signed in directly without email.' };
    }
    const redirectTo = window.location.origin + window.location.pathname;
    const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
    if (error) return { ok: false, error: error.message };
    return { ok: true };
  };

  const signInWithProvider = async (provider) => {
    if (!sb) return { ok: false, error: 'Supabase not configured.' };
    const redirectTo = window.location.origin + window.location.pathname;
    const options = { redirectTo };
    if (provider === 'google') options.queryParams = { prompt: 'select_account' };
    const { error } = await sb.auth.signInWithOAuth({ provider, options });
    if (error) return { ok: false, error: error.message };
    return { ok: true };
  };

  const signOut = async () => {
    if (sb) await sb.auth.signOut();
    sessionStorage.removeItem('ig-authed-email');
    setSession(null);
    window.location.hash = '/overview';
  };

  return { session, loading, sendMagicLink, signInWithProvider, signOut, authedEmail: session?.user?.email || null };
}

/* =====================================================================
   SEARCH INDEX
   ===================================================================== */
function buildSearchIndex(data) {
  if (!data) return [];
  const idx = [];
  data.sessions.forEach(s => {
    idx.push({ type: 'session', label: s.title, sub: s.displayDate + ' · ' + s.theme, route: '/session/' + s.id, body: (s.summaryMd || '') + ' ' + (s.keyTakeaway || '') });
  });
  data.wins.forEach((w, i) => idx.push({ type: 'win', label: w.title, sub: 'Win', route: '/growth#wins', body: w.body }));
  data.growthEdges.forEach((g, i) => idx.push({ type: 'edge', label: g.title, sub: 'Growth Edge', route: '/growth#edges', body: g.body }));
  data.quotes.forEach((q, i) => idx.push({ type: 'quote', label: q.text, sub: q.attribution, route: '/growth#quotes', body: q.text }));
  data.patterns.forEach((p) => idx.push({ type: 'pattern', label: p.label, sub: 'Recurring Pattern', route: '/growth#patterns', body: p.label }));
  data.actionItems.forEach(a => idx.push({ type: 'action', label: a.text, sub: 'Action Item · ' + a.status, route: '/actions', body: a.text + ' ' + (a.notes || '') }));
  data.nextQuarter.forEach(p => idx.push({ type: 'priority', label: p.title, sub: 'This Quarter', route: '/next', body: p.body }));
  data.resources.forEach(folder => folder.items.forEach(item => idx.push({ type: 'resource', label: item.title, sub: folder.folder, route: '/resources#' + item.id, body: item.description })));
  return idx;
}

function search(query, index) {
  if (!query || query.trim().length < 2) return [];
  const q = query.toLowerCase();
  return index
    .map(item => {
      const labelHit = item.label.toLowerCase().includes(q) ? 2 : 0;
      const bodyHit = item.body.toLowerCase().includes(q) ? 1 : 0;
      return { ...item, score: labelHit + bodyHit };
    })
    .filter(i => i.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12);
}

/* =====================================================================
   MARKDOWN
   ===================================================================== */
function Markdown({ source }) {
  const html = useMemo(() => marked.parse(source || ''), [source]);
  return <div className="prose" dangerouslySetInnerHTML={{ __html: html }} />;
}

/* =====================================================================
   COMPONENTS — small

function StatBlock({ value, label, accent }) {

    <div className="surface rounded-xl px-5 py-4 min-w-[100px] text-center">

      <div className="text-[10px] tracking-[0.18em] text-faint mt-1 uppercase">{label}</div>
    </div>

}

function SectionHeading({ children, sub }) {
  return (
    <div className="mb-5">
      <h2 className="text-xl font-bold flex items-center gap-3" style={{ borderLeft: '3px solid var(--primary)', paddingLeft: '12px' }}>{children}</h2>
      {sub && <p className="text-faint text-sm mt-1.5 ml-[15px]">{sub}</p>}
    </div>
  );
}

/* =====================================================================

   ===================================================================== */

function Icon({ name, size = 18, className = '', strokeWidth = 1.5, style = {} }) {
  const path = ICONS[name];
  if (!path) return null;
  return (
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={strokeWidth} stroke="currentColor" width={size} height={size} className={className} style={{ flexShrink: 0, display: 'inline-block', ...style }}>
      <path strokeLinecap="round" strokeLinejoin="round" d={path} />
    </svg>
  );
}

function CTACard({ icon, title, body, cta, onClick }) {
  return (
    <button onClick={onClick} className="surface rounded-xl p-5 text-left hover:opacity-90 transition-opacity flex flex-col h-full" style={{ borderLeft: '3px solid var(--secondary)' }}>
      <div className="mb-2 text-secondary"><Icon name={icon} size={22} strokeWidth={1.5} /></div>
      <h3 className="font-semibold mb-1">{title}</h3>
      <p className="text-faint text-sm reading mb-3 flex-1" style={{ fontSize: '13px' }}>{body}</p>
      <span className="text-primary text-sm font-medium">{cta}</span>
    </button>
  );
}

function ProposalSection({ proposal, profile, embedded }) {
  if (!proposal) return null;
  return (
    <div>
      {!embedded && <SectionHeading sub="Designed around what's already moved.">{proposal.title || 'Next Chapter'}</SectionHeading>}
      <div className="surface rounded-2xl p-6 md:p-8" style={{ borderTop: '2px solid var(--primary)' }}>
        <p className="text-faint text-xs tracking-widest mb-5">{profile.name.toUpperCase()} — INNER GAME COACHING</p>

        {proposal.stats && proposal.stats.length > 0 && (
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
            {proposal.stats.map((s, i) => (
              <div key={i} className="surface-2 rounded-xl px-4 py-3 text-center">
                <div className="text-2xl font-bold text-primary">{s.value}</div>
                <div className="text-[10px] tracking-widest text-faint mt-1 uppercase">{s.label}</div>
              </div>
            ))}
          </div>
        )}

        {proposal.package && (
          <div className="rounded-xl p-5 mb-6" style={{ background: 'var(--primary-soft)', border: '1px solid var(--border)' }}>
            <p className="text-xs tracking-widest text-faint mb-4">{proposal.package.headline.toUpperCase()}</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <div className="text-3xl font-bold text-primary">{proposal.package.price}</div>
                <div className="text-xs text-faint mt-1 tracking-wide uppercase">{proposal.package.priceLabel}</div>
              </div>
              <div>
                <div className="text-2xl font-bold">{proposal.package.sessions}</div>
                <div className="text-xs text-faint mt-1 tracking-wide uppercase">{proposal.package.sessionsLabel}</div>
              </div>
              <div>
                <div className="text-2xl font-bold text-secondary">{proposal.package.duration}</div>
                <div className="text-xs text-faint mt-1 tracking-wide uppercase">{proposal.package.durationLabel}</div>
              </div>
            </div>
          </div>
        )}

        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          {proposal.included && proposal.included.length > 0 && (
            <div>
              <p className="text-xs tracking-widest text-faint mb-3">WHAT'S INCLUDED</p>
              <ul className="space-y-2">
                {proposal.included.map((item, i) => (
                  <li key={i} className="flex gap-2 text-sm reading">
                    <span className="text-primary mt-0.5">•</span>
                    <span>{item}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}
          {proposal.focus && proposal.focus.length > 0 && (
            <div>
              <p className="text-xs tracking-widest text-faint mb-3">FOCUS OF NEXT CHAPTER</p>
              <ul className="space-y-2">
                {proposal.focus.map((item, i) => (
                  <li key={i} className="flex gap-2 text-sm reading">
                    <span className="text-secondary mt-0.5">•</span>
                    <span>{item}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>

        {proposal.tagline && (
          <div className="border-l-2 pl-4 mt-6" style={{ borderColor: 'var(--secondary)' }}>
            <p className="italic text-secondary reading" style={{ fontSize: '15px' }}>"{proposal.tagline}"</p>
            {proposal.taglineNote && <p className="text-xs text-faint mt-1">— {proposal.taglineNote}</p>}
          </div>
        )}
      </div>
    </div>
  );
}

function HeroCTAs({ onNav, data, actionItems }) {
  const scoredKey = `ig-scorecard-updated-${data.id}`;
  const lastScored = localStorage.getItem(scoredKey);
  const daysSinceScored = lastScored ? Math.floor((Date.now() - parseInt(lastScored)) / 86400000) : null;
  const scoredBody = daysSinceScored == null ? "First self-assessment pending." : daysSinceScored === 0 ? "Updated today." : `Last updated ${daysSinceScored} day${daysSinceScored !== 1 ? 's' : ''} ago.`;

  // Last session with a recap
  const lastSession = useMemo(() => [...data.sessions].reverse().find(s => s.summaryMd && !s.summaryMd.startsWith('_No recap')), [data]);
  const lastActions = useMemo(() => actionItems.filter(a => a.sessionId === lastSession?.id), [actionItems, lastSession]);
  const open = lastActions.filter(a => a.status !== 'done').length;
  const done = lastActions.filter(a => a.status === 'done').length;
  const total = lastActions.length;
  const actionsBody = total === 0
    ? "No commitments yet from your most recent session."
    : open === 0
      ? `All ${total} commitments closed. Movement.`
      : `${open} open · ${done} done · ${total} total. From ${lastSession.displayDate}.`;

  return (
    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
      <CTACard
        icon="check"
        title="Action items from your last session"
        body={actionsBody}
        cta="Track your progress →"
        onClick={() => onNav('/actions')}
      />
      <CTACard
        icon="chart"
        title="Rate yourself on the scorecard"
        body={scoredBody}
        cta="Update your scores →"
        onClick={() => onNav('/scorecard')}
      />
    </div>
  );
}

function EmptyState({ icon, title, body }) {
  return (
    <div className="surface rounded-2xl p-10 text-center">
      <div className="mb-4 opacity-50 text-faint flex justify-center"><Icon name={icon || 'document'} size={36} strokeWidth={1.25} /></div>
      <h3 className="font-semibold text-lg mb-2">{title}</h3>
      <p className="text-dim text-sm max-w-md mx-auto reading" style={{ fontSize: '15px' }}>{body}</p>
    </div>
  );
}

function LoginScreen({ sendMagicLink, signInWithProvider }) {
  const [email, setEmail] = useState('');
  const [status, setStatus] = useState('idle'); // idle | sending | sent | error
  const [err, setErr] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setStatus('sending');
    setErr('');
    const result = await sendMagicLink(email);
    if (result.ok) {
      setStatus('sent');
    } else {
      setErr(result.error || 'Something went wrong.');
      setStatus('error');
    }
  };

  const oauth = async (provider) => {
    setErr('');
    const result = await signInWithProvider?.(provider);
    if (result && !result.ok) setErr(result.error || `Could not start ${provider} sign-in.`);
  };

  return (
    <div className="login-bg min-h-screen flex flex-col items-center justify-center px-4">
      <div className="surface rounded-2xl p-10 max-w-md w-full fade-in">
        <div className="logo-lockup logo-lockup-lg mb-7">
          <div className="dh-mark">
            <span className="dh">DH</span>
            <span className="url">DHIREN<br/>HARCHANDANI<br/>.COM</span>
          </div>
          <div className="divider"></div>
          <div className="myig">
            <span className="row">MASTER YOUR</span>
            <span className="row">INNER GAME</span>
          </div>
        </div>
        <h1 className="text-2xl font-bold mb-2">Coaching Dashboard</h1>
        <p className="text-dim text-sm mb-8">Sign in to your journey.</p>

        {!USE_REAL_AUTH && (
          <div className="mb-6 p-3 rounded-lg surface-2 text-xs text-dim">
            <span className="text-secondary font-semibold">Setup mode.</span> Supabase not configured. Any email signs you in.
          </div>
        )}

        {status === 'sent' ? (
          <div className="text-center py-6">
            <div className="mb-3 text-primary flex justify-center"><Icon name="envelope" size={36} strokeWidth={1.25} /></div>

function CoacheeSwitcher({ coachees, activeFolder, setActiveFolder }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  if (!coachees || coachees.length < 2) return null;
  const active = coachees.find(c => c.folder === activeFolder) || coachees[0];
  return (
    <div ref={ref} className="relative">
      <button onClick={() => setOpen(o => !o)} className="surface-2 rounded-lg px-3 py-2 text-sm flex items-center gap-2 hover:opacity-80" title="Switch coachee">
        <Icon name="users" size={16} />
        <span className="truncate" style={{ maxWidth: '140px' }}>{active.preferredName || active.name}</span>
        <Icon name="chevron-down" size={14} />
      </button>
      {open && (
        <div className="absolute right-0 mt-1 surface rounded-lg shadow-lg overflow-hidden z-50" style={{ minWidth: '220px' }}>
          {coachees.map(c => (
            <button key={c.folder}
              onClick={() => { setActiveFolder(c.folder); setOpen(false); }}
              className={`w-full text-left px-4 py-2.5 text-sm hover:bg-surface-2 ${c.folder === activeFolder ? 'text-primary font-semibold' : ''}`}
              style={{ background: c.folder === activeFolder ? 'var(--primary-soft)' : 'transparent' }}
            >
              {c.name}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function EditableYearWord({ value, onSave }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  useEffect(() => { setVal(value); }, [value]);
  const commit = () => {
    const trimmed = val.trim();
    if (!trimmed) { setVal(value); setEditing(false); return; }
    if (trimmed !== value) onSave(trimmed);
    setEditing(false);
  };
  if (editing) {
    return (
      <input
        autoFocus
        value={val}
        onChange={e => setVal(e.target.value)}
        onBlur={commit}
        onKeyDown={e => {
          if (e.key === 'Enter') commit();
          if (e.key === 'Escape') { setVal(value); setEditing(false); }
        }}
        className="bg-transparent outline-none font-bold"
        style={{ fontStyle: 'normal', borderBottom: '2px solid var(--primary)', minWidth: '8ch' }}
      />
    );
  }
  return (
    <strong
      onClick={() => setEditing(true)}
      style={{ fontStyle: 'normal', cursor: 'pointer', borderBottom: '1px dashed currentColor', paddingBottom: '1px' }}
      title="Click to edit"
    >{value}</strong>
  );
}

function ActionRow({ item, onCycle }) {
  const sessionRef = item._sessionLabel ? <span className="text-faint text-xs ml-2">· {item._sessionLabel}</span> : null;
  const cls = item.status === 'done' ? 'check done' : item.status === 'ongoing' ? 'check ongoing' : 'check';
  const labelOpacity = item.status === 'done' ? 'opacity-60 line-through' : '';
  return (
    <div className="surface rounded-xl p-4 flex gap-3 items-start">
      <button onClick={onCycle} className={cls} title={`Status: ${item.status}`}>
        {item.status === 'done' ? '✓' : item.status === 'ongoing' ? '◐' : ''}
      </button>
      <div className="flex-1 min-w-0">
        <p className={'text-sm ' + labelOpacity}>{item.text}</p>
        {item.notes && <p className="text-faint text-xs mt-1 italic">{item.notes}</p>}
        <div className="text-faint text-xs mt-1">
          <span className="capitalize">{item.category?.replace('-', ' ') || 'general'}</span>
          {sessionRef}
        </div>
      </div>
    </div>
  );
}

function ActionItemsView({ data, actionItems, cycleStatus }) {
  const [filter, setFilter] = useState('all');
  const sessionLookup = useMemo(() => Object.fromEntries(data.sessions.map(s => [s.id, s.displayDate])), [data]);
  const enriched = useMemo(() => actionItems.map(a => ({ ...a, _sessionLabel: sessionLookup[a.sessionId] })), [actionItems, sessionLookup]);
  const filtered = filter === 'all' ? enriched : enriched.filter(a => a.status === filter);

  const counts = useMemo(() => ({
    all: actionItems.length,
    pending: actionItems.filter(a => a.status === 'pending').length,
    ongoing: actionItems.filter(a => a.status === 'ongoing').length,
    done: actionItems.filter(a => a.status === 'done').length,
  }), [actionItems]);

  return (
    <div className="fade-in">
      <p className="text-faint text-xs tracking-[0.2em] mb-2">ACTION ITEMS</p>
      <h1 className="text-3xl font-bold mb-2">Commitments Across Every Session</h1>
      <p className="text-dim mb-6 reading" style={{ fontSize: '15px' }}>Tap to cycle status. <em className="text-secondary not-italic">Done is the only proof. Notes are the receipts.</em></p>

      <div className="flex gap-2 mb-6 flex-wrap">
        {['all', 'pending', 'ongoing', 'done'].map(f => (
          <button key={f} onClick={() => setFilter(f)}

/* =====================================================================
   VIEW: SCORECARD (interactive — self-assessment)
   ===================================================================== */
function ScorecardView({ data }) {
  const selfKey = `ig-scorecard-self-${data.id}`;
  const updatedKey = `ig-scorecard-updated-${data.id}`;
  const [selfScores, setSelfScores] = useState(() => {
    try { return JSON.parse(localStorage.getItem(selfKey) || '{}'); } catch { return {}; }
  });
  const updateSelf = (dimension, value) => {
    const next = { ...selfScores, [dimension]: value };
    setSelfScores(next);
    localStorage.setItem(selfKey, JSON.stringify(next));
    localStorage.setItem(updatedKey, Date.now().toString());
  };
  const resetSelf = () => {
    setSelfScores({});
    localStorage.removeItem(selfKey);
    localStorage.removeItem(updatedKey);
  };
  const hasSelf = Object.keys(selfScores).length > 0;

  return (
    <div className="fade-in">
      <p className="text-faint text-xs tracking-[0.2em] mb-2">SCORECARD</p>
      <h1 className="text-3xl font-bold mb-2">Inner Game Scorecard</h1>
      <p className="text-dim mb-8 reading" style={{ fontSize: '15px' }}>Tap a number to set your self-assessment. <em className="text-secondary not-italic">Scores are not the goal. Movement is.</em></p>

      <div className="surface rounded-2xl p-5 mb-6 flex items-center justify-between flex-wrap gap-3">
        <div className="flex items-center gap-6 text-xs flex-wrap">
          <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm" style={{ background: 'var(--primary)' }}></span><span>Your self-assessment</span></div>
          <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm" style={{ background: 'var(--secondary)' }}></span><span>Coach's read</span></div>
        </div>
        {hasSelf && <button onClick={resetSelf} className="text-faint text-xs hover:text-primary">Reset to coach's scores</button>}
      </div>

      <div className="surface rounded-2xl p-6 md:p-8">
        <div className="space-y-6">
          {data.scorecard.map((s) => {
            const self = selfScores[s.dimension];
            return (
              <div key={s.dimension}>
                <div className="flex justify-between items-baseline text-sm mb-3 flex-wrap gap-2">
                  <span className="font-medium">{s.dimension}</span>
                  <div className="flex gap-4 text-xs">
                    <span className="text-secondary">Coach <strong>{s.score}</strong></span>
                    <span className="text-primary">You <strong>{self !== undefined ? self : '—'}</strong></span>
                  </div>
                </div>
                <div className="flex gap-1">
                  {Array.from({ length: s.max }).map((_, i) => {
                    const val = i + 1;
                    const isSelfFilled = self !== undefined && val <= self;
                    const isCoachMark = val === s.score;
                    return (
                      <button
                        key={i}
                        onClick={() => updateSelf(s.dimension, val)}
                        className="flex-1 rounded-sm hover:opacity-90 transition-opacity relative"
                        style={{
                          height: '20px',
                          background: isSelfFilled ? 'var(--primary)' : 'var(--surface-2)',
                          border: '1px solid var(--border)',
                          cursor: 'pointer',
                        }}
                        title={`Set ${val}/${s.max}`}
                      >
                        {isCoachMark && (
                          <span style={{ position: 'absolute', top: '-6px', left: '50%', transform: 'translateX(-50%)', width: '6px', height: '6px', borderRadius: '50%', background: 'var(--secondary)' }}></span>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <p className="text-faint text-xs mt-6 reading text-center">Future versions will track the trajectory over time. For now — your latest self-assessment, alongside the coach's read.</p>
    </div>
  );
}

    if (!fin?.embed?.storagePath || !sb) return;
    sb.storage.from('resources').createSignedUrl(fin.embed.storagePath, 3600)
      .then(({ data, error }) => {
        if (error) { setErr(error.message); return; }
        if (data?.signedUrl) setSignedUrl(data.signedUrl);
      });
  }, [fin?.embed?.storagePath]);

  if (!fin?.enabled) {
    return <EmptyState icon="chart" title="No financials section." body="There is no financial dashboard configured for this account yet." />;
  }

  const lastUpdated = fin.lastUpdated ? new Date(fin.lastUpdated).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }) : null;

    }
    return null;
  }, [data, resourceId]);

  // Generate signed URL for Storage-backed PDFs
  const [signedUrl, setSignedUrl] = useState(null);
  useEffect(() => {
    if (!item) return;
    if (item.storagePath && sb) {
      sb.storage.from('resources').createSignedUrl(item.storagePath, 3600)
        .then(({ data, error }) => {
          if (data?.signedUrl) setSignedUrl(data.signedUrl);

      <button onClick={() => onNav('/resources')} className="text-primary text-sm mb-6 hover:underline flex items-center gap-1">← Library</button>
      <p className="text-faint text-xs tracking-[0.2em] mb-2">{item.folder.toUpperCase()}</p>

function formatJournalDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  const isYest = d.toDateString() === yest.toDateString();
  const time = d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  if (sameDay) return `Today · ${time}`;
  if (isYest) return `Yesterday · ${time}`;
  const sameYear = d.getFullYear() === now.getFullYear();
  return d.toLocaleDateString(undefined, sameYear
    ? { month: 'short', day: 'numeric' }
    : { month: 'short', day: 'numeric', year: 'numeric' });
}

function JournalComposer({ data, entry, onSave, onCancel }) {
  const [body, setBody] = useState(entry?.body || '');
  const [tags, setTags] = useState(entry?.tags || []);
  const [tagInput, setTagInput] = useState('');
  const [linkedSessionId, setLinkedSessionId] = useState(entry?.linkedSessionId || '');
  const taRef = useRef(null);

  useEffect(() => { if (taRef.current) taRef.current.focus(); }, []);

  const tagSuggestions = useMemo(() => {
    const fromEntries = (data.journal || []).flatMap(e => e.tags || []);
    const fromPatterns = (data.patterns || []).map(p => p.label);
    const all = [...new Set([...fromEntries, ...fromPatterns])];
    const q = tagInput.trim().toLowerCase();
    if (!q) return all.filter(t => !tags.includes(t)).slice(0, 8);
    return all.filter(t => t.toLowerCase().includes(q) && !tags.includes(t)).slice(0, 8);
  }, [data, tags, tagInput]);

  const recentSessions = useMemo(() => [...data.sessions].reverse().slice(0, 12), [data]);

  const addTag = (t) => {
    const clean = t.trim().replace(/^#/, '');
    if (!clean || tags.includes(clean)) { setTagInput(''); return; }
    setTags([...tags, clean]);
    setTagInput('');
  };
  const removeTag = (t) => setTags(tags.filter(x => x !== t));
  const onTagKey = (e) => {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(tagInput); }
    else if (e.key === 'Backspace' && !tagInput && tags.length) { removeTag(tags[tags.length - 1]); }
  };

  const submit = () => {
    const trimmed = body.trim();
    if (!trimmed) return;
    onSave({ body: trimmed, tags, linkedSessionId: linkedSessionId || null });
  };

  return (
    <div className="surface rounded-2xl p-5 md:p-6 mb-6">
      <textarea
        ref={taRef}
        value={body}
        onChange={e => setBody(e.target.value)}
        placeholder="What's landing for you right now?"
        rows={5}
        className="w-full bg-transparent resize-none outline-none reading"
        style={{ fontSize: '16px', lineHeight: 1.7, color: 'var(--text)' }}
      />

      {tags.length > 0 && (
        <div className="flex flex-wrap gap-2 mt-3">
          {tags.map(t => (
            <span key={t} className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs bg-primary-soft text-primary">
              #{t}
              <button onClick={() => removeTag(t)} className="hover:opacity-70" title="Remove tag"><Icon name="xmark" size={12} /></button>
            </span>
          ))}
        </div>
      )}

      <div className="mt-3 relative">
        <div className="flex items-center gap-2">
          <Icon name="sparkles" size={14} className="text-faint" />
          <input
            value={tagInput}
            onChange={e => setTagInput(e.target.value)}
            onKeyDown={onTagKey}
            placeholder="Add a theme — Enter to confirm"
            className="flex-1 bg-transparent text-sm outline-none"
            style={{ color: 'var(--text)' }}
          />
        </div>
        {tagInput && tagSuggestions.length > 0 && (
          <div className="absolute z-10 mt-1 surface rounded-lg p-1 max-w-full">
            {tagSuggestions.map(s => (
              <button key={s} onClick={() => addTag(s)} className="block w-full text-left px-3 py-1.5 text-sm hover:bg-primary-soft rounded">#{s}</button>
            ))}
          </div>
        )}
      </div>

      <div className="mt-4 pt-4 border-t border-default flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
        <div className="flex items-center gap-2 text-sm">
          <Icon name="calendar" size={14} className="text-faint" />
          <select
            value={linkedSessionId}
            onChange={e => setLinkedSessionId(e.target.value)}
            className="bg-transparent text-sm outline-none cursor-pointer"
            style={{ color: 'var(--text-dim)' }}
          >
            <option value="">Not linked to a session</option>
            {recentSessions.map(s => (
              <option key={s.id} value={s.id}>{s.displayDate} — {s.title}</option>
            ))}
          </select>
        </div>
        <div className="flex gap-2 justify-end">
          {onCancel && (
            <button onClick={onCancel} className="px-4 py-2 rounded-lg text-sm hover:bg-primary-soft">Cancel</button>
          )}
          <button onClick={submit} disabled={!body.trim()} className="btn-primary px-5 py-2 rounded-lg text-sm font-semibold disabled:opacity-50">
            {entry ? 'Save changes' : 'Save entry'}
          </button>
        </div>
      </div>
    </div>
  );
}

function JournalView({ data, updateData, onNav }) {
  const entries = data.journal || [];
  const [composing, setComposing] = useState(entries.length === 0);
  const [editingId, setEditingId] = useState(null);
  const [tagFilter, setTagFilter] = useState(null);
  const [q, setQ] = useState('');

  const sessionLookup = useMemo(() => Object.fromEntries(data.sessions.map(s => [s.id, s])), [data]);

  const allTags = useMemo(() => {
    const counts = {};
    entries.forEach(e => (e.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
    return Object.entries(counts).sort((a, b) => b[1] - a[1]);
  }, [entries]);

  const filtered = useMemo(() => {
    let list = [...entries].sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    if (tagFilter) list = list.filter(e => (e.tags || []).includes(tagFilter));
    const query = q.trim().toLowerCase();
    if (query) list = list.filter(e =>
      (e.body || '').toLowerCase().includes(query) ||
      (e.tags || []).some(t => t.toLowerCase().includes(query))
    );
    return list;
  }, [entries, tagFilter, q]);

  const persist = async (newEntries) => {
    await updateData({ ...data, journal: newEntries });
  };

  const saveNew = async (payload) => {
    const newEntry = {
      id: 'j_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      createdAt: new Date().toISOString(),
      ...payload,
    };
    await persist([newEntry, ...entries]);
    setComposing(false);
  };

  const saveEdit = async (id, payload) => {
    await persist(entries.map(e => e.id === id ? { ...e, ...payload, updatedAt: new Date().toISOString() } : e));
    setEditingId(null);
  };

  const remove = async (id) => {
    await persist(entries.filter(e => e.id !== id));
  };

  return (
    <div className="fade-in">
      <p className="text-faint text-xs tracking-[0.2em] mb-2">JOURNAL</p>
      <h1 className="text-3xl font-bold mb-2">Between Sessions.</h1>
      <p className="text-dim mb-8 reading" style={{ fontSize: '15px' }}>Where the work keeps moving. <em className="text-secondary not-italic">Only you see this.</em></p>

      {!composing && !editingId && (
        <button onClick={() => setComposing(true)} className="surface rounded-2xl p-5 mb-6 w-full text-left hover:opacity-90 transition-opacity flex items-center gap-3 text-dim">
          <Icon name="pencil" size={18} className="text-primary" />
          <span className="reading" style={{ fontSize: '15px' }}>Begin.</span>
        </button>
      )}

      {composing && (
        <JournalComposer data={data} onSave={saveNew} onCancel={entries.length > 0 ? () => setComposing(false) : null} />
      )}

      {entries.length > 0 && !composing && (
        <div className="flex flex-col md:flex-row md:items-center gap-3 mb-5">
          <div className="surface rounded-lg flex items-center gap-2 px-3 py-2 flex-1 min-w-0">
            <Icon name="search" size={14} className="text-faint" />
            <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search entries"
              className="flex-1 bg-transparent text-sm outline-none min-w-0" style={{ color: 'var(--text)' }} />
            {q && <button onClick={() => setQ('')} className="text-faint hover:text-primary"><Icon name="xmark" size={12} /></button>}
          </div>
        </div>
      )}

      {allTags.length > 0 && !composing && (
        <div className="flex gap-2 flex-wrap mb-6">
          <button onClick={() => setTagFilter(null)}
            className={'px-3 py-1 rounded-full text-xs ' + (tagFilter === null ? 'btn-primary' : 'surface hover:opacity-80 text-dim')}>
            All <span className="opacity-70">({entries.length})</span>
          </button>
          {allTags.map(([t, count]) => (
            <button key={t} onClick={() => setTagFilter(t === tagFilter ? null : t)}
              className={'px-3 py-1 rounded-full text-xs ' + (tagFilter === t ? 'btn-primary' : 'surface hover:opacity-80 text-dim')}>
              #{t} <span className="opacity-70">({count})</span>
            </button>
          ))}
        </div>
      )}

      {entries.length === 0 && !composing ? null : filtered.length === 0 ? (
        <EmptyState icon="search" title="Nothing matched." body="Clear the filter or search to see every entry." />
      ) : (
        <div className="space-y-4">
          {filtered.map(e => editingId === e.id ? (
            <JournalComposer key={e.id} data={data} entry={e}
              onSave={(payload) => saveEdit(e.id, payload)}
              onCancel={() => setEditingId(null)} />
          ) : (
            <JournalEntryCard key={e.id} entry={e}
              sessionLabel={e.linkedSessionId && sessionLookup[e.linkedSessionId]?.displayDate}
              onEdit={() => setEditingId(e.id)}
              onDelete={() => remove(e.id)}
              onJumpSession={() => onNav(`/session/${e.linkedSessionId}`)} />
          ))}
        </div>
      )}
    </div>
  );
}

function AppShell({ data, signOut, updateProfileField, updateData, coachees, activeFolder, setActiveFolder }) {
  const [route, go] = useHashRoute();
  const [theme, toggleTheme] = useTheme();
  const [searchOpen, setSearchOpen] = useState(false);
  const [actionItems, cycleStatus] = useActionStatus(data, updateData);
  const [priorities, cyclePriority] = usePriorityStatus(data, updateData);
  const allSessionIds = useMemo(() => data.sessions.map(s => s.id), [data]);
  const { viewed, markViewed, unviewedCount, unviewedIds } = useViewedSessions(data.id, allSessionIds);

  const searchIndex = useMemo(() => buildSearchIndex(data), [data]);

  // ⌘K shortcut
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setSearchOpen(true); }
      if (e.key === 'Escape') setSearchOpen(false);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Determine active tab
  const activeId = useMemo(() => {
    const seg = route.split('/')[1];
    if (seg === 'session') return 'sessions';
    if (seg === 'resource') return 'resources';
    if (seg === 'next') return 'next';
    if (seg === 'financials') return 'financials';
    if (!seg) return 'overview';
    return seg;
  }, [route]);

  // Render view
  const view = useMemo(() => {
    const parts = route.split('/').filter(Boolean);
    const seg = parts[0] || 'overview';
    if (seg === 'overview') return <OverviewView data={data} onNav={go} actionItems={actionItems} updateProfileField={updateProfileField} />;
    if (seg === 'sessions') return <SessionsView data={data} onNav={go} route={route} unviewedIds={unviewedIds} />;
    if (seg === 'session' && parts[1]) return <SessionDetailView data={data} sessionId={parts[1]} onNav={go} actionItems={actionItems} cycleStatus={cycleStatus} markViewed={markViewed} />;
    if (seg === 'actions') return <ActionItemsView data={data} actionItems={actionItems} cycleStatus={cycleStatus} />;
    if (seg === 'growth') return <GrowthView data={data} />;
    if (seg === 'scorecard') return <ScorecardView data={data} />;
    if (seg === 'next') return <NextQuarterView data={data} priorities={priorities} cyclePriority={cyclePriority} />;
    if (seg === 'resources') return <ResourcesView data={data} onNav={go} />;
    if (seg === 'resource' && parts[1]) return <ResourceDetailView data={data} resourceId={parts[1]} onNav={go} />;
    if (seg === 'journal') return <JournalView data={data} updateData={updateData} onNav={go} />;
    if (seg === 'messages') return <MessagesView data={data} />;
    if (seg === 'financials') return <FinancialsView data={data} />;
    return <OverviewView data={data} onNav={go} />;
  }, [route, data, actionItems, priorities]);

  return (
    <div className="flex min-h-screen">
      <Sidebar activeId={activeId} onNav={go} onSignOut={signOut} profile={data.profile} badges={{ sessions: unviewedCount }} data={data} />
      <div className="flex-1 flex flex-col main-content min-w-0">
        <TopBar profile={data.profile} onSearch={() => setSearchOpen(true)} onToggleTheme={toggleTheme} theme={theme} coachees={coachees} activeFolder={activeFolder} setActiveFolder={setActiveFolder} />
        <main className="flex-1 p-5 md:p-10 overflow-y-auto" key={route}>
          <div className="max-w-5xl mx-auto">
            {view}
            <p className="text-faint text-xs text-center mt-16 pb-4">Developed by InnerGame Consulting</p>
          </div>
        </main>
      </div>
      <MobileBottomNav activeId={activeId} onNav={go} />
      {searchOpen && <SearchOverlay onClose={() => setSearchOpen(false)} index={searchIndex} onNav={go} />}
    </div>
  );
}

    </div>
  );

  return <AppShell data={data} signOut={signOut} updateProfileField={updateProfileField} updateData={updateData} coachees={coachees} activeFolder={activeFolder} setActiveFolder={setActiveFolder} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
